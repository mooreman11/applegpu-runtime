name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test-rust:
    name: Rust Tests
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Tests that need Metal GPU gracefully skip via get_device() -> None -> return
      # gpu-service tests need Metal GPU, excluded from CI
      - run: cargo test -p applegpu-core -p applegpu-wire -p applegpu-client

  test-swift:
    name: Swift Tests
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      # Swift Metal tests may fail without GPU — allow failure
      - run: cd swift && swift test || echo "::warning::Swift tests require Metal GPU (not available on CI runner)"

  build-python:
    name: Python Build Check (${{ matrix.python }})
    runs-on: macos-14
    strategy:
      matrix:
        python: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: astral-sh/setup-uv@v5
      - run: pip install maturin
      - run: uv sync
      # Verify the Python extension builds (but skip tests — they need Metal GPU)
      - run: uv run maturin develop
      - run: uv run python -c "import applegpu_runtime; print('Version:', applegpu_runtime.version())"
